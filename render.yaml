services:
  - type: web
    name: ai-code-review-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_MODEL
        value: deepseek/deepseek-chat
      - key: PYTHON_VERSION
        value: "3.12.0"
